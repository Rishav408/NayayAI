<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat – NyayaAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: {
                DEFAULT: '#d97706',
                hover: '#b45309',
                light: '#f59e0b',
                subtle: '#fef3c7',
              },
              surface: {
                primary: '#ffffff',
                secondary: '#f9f9f8',
                tertiary: '#f0eeeb',
              },
              ink: {
                primary: '#1a1a19',
                secondary: '#5c5c5a',
                muted: '#8a8a85',
              },
              warm: {
                border: '#e5e3de',
                dark: '#1a1917',
                panel: '#222120',
                card: '#2a2926',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            boxShadow: {
              soft: '0 4px 20px rgba(0,0,0,0.06)',
              card: '0 1px 4px rgba(0,0,0,0.08)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f9f9f8;
        --bg-tertiary: #f0eeeb;
        --text-primary: #1a1a19;
        --text-secondary: #5c5c5a;
        --text-muted: #8a8a85;
        --accent: #d97706;
        --accent-hover: #b45309;
        --accent-subtle: #fef3c7;
        --border: #e5e3de;
        --border-subtle: #f0eeeb;
        --surface-user: #f0eeeb;
        --surface-ai: #ffffff;
        --sidebar: #f9f9f8;
        --shadow: rgba(0,0,0,0.06);
      }
      .dark {
        --bg-primary: #1a1917;
        --bg-secondary: #222120;
        --bg-tertiary: #2a2926;
        --text-primary: #e8e6e1;
        --text-secondary: #9b9892;
        --text-muted: #6b6a66;
        --accent: #d97706;
        --accent-hover: #f59e0b;
        --accent-subtle: #292217;
        --border: #333230;
        --border-subtle: #2a2926;
        --surface-user: #2a2926;
        --surface-ai: #222120;
        --sidebar: #1e1d1b;
        --shadow: rgba(0,0,0,0.3);
      }
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
      }
    </style>
    <style>
      .ny-scroll { scrollbar-width: none; -ms-overflow-style: none; }
      .ny-scroll::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
      .ny-scroll::-webkit-scrollbar-thumb { background: transparent; }

      /* Sidebar conversation items - override JS-injected classes */
      #historyList li {
        border: none !important;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
        transition: background 0.15s;
      }
      #historyList li:hover {
        background: var(--bg-tertiary);
      }
      #historyList li.ring-1 {
        background: var(--accent-subtle) !important;
        box-shadow: none !important;
      }

      /* Message container - override JS-injected styles */
      #chatContainer > div {
        border: none !important;
        padding: 16px 0 !important;
        border-radius: 0 !important;
        max-width: 48rem;
        margin: 0 auto;
        width: 100%;
      }

      /* User messages - right-aligned pill */
      #chatContainer > div.ml-8 {
        display: flex;
        justify-content: flex-end;
      }
      #chatContainer > div.ml-8 .flex-1 {
        background: var(--bg-tertiary);
        border-radius: 18px 18px 4px 18px;
        padding: 10px 16px;
        max-width: 75%;
      }

      /* AI messages - left-aligned, no background */
      #chatContainer > div.mr-8 {
        display: flex;
        justify-content: flex-start;
      }
      #chatContainer > div.mr-8 .flex-1 {
        max-width: 85%;
        padding: 4px 0;
      }

      /* Hide avatars */
      #chatContainer > div.mr-8 > div:first-child {
        display: none;
      }
      #chatContainer > div.ml-8 > div:first-child {
        display: none;
      }

      /* AI label override */
      #chatContainer .text-royal,
      #chatContainer .dark\:text-blue-300 {
        color: var(--accent) !important;
        font-weight: 600;
        font-size: 0.75rem;
        margin-bottom: 6px;
        display: block;
      }

      /* Loading state override */
      #chatContainer > div:has(.animate-bounce) {
        border: none !important;
        padding: 16px 0 !important;
      }

      /* Sidebar collapse/expand */
      .sidebar-panel {
        width: 260px;
        flex-shrink: 0;
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
      }
      .sidebar-panel.collapsed {
        width: 0px;
        border-right-color: transparent;
      }
      .sidebar-panel.collapsed .sidebar-inner {
        opacity: 0;
      }
      .sidebar-inner {
        width: 260px;
        height: 100%;
        display: flex;
        flex-direction: column;
        transition: opacity 0.15s ease;
      }

      .chat-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-overlay {
        display: none;
      }

      @media (max-width: 767px) {
        .sidebar-panel {
          position: fixed;
          left: 0;
          top: 64px;
          bottom: 0;
          z-index: 50;
          width: 260px;
          transform: translateX(-100%);
          transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          border-right: 1px solid var(--border);
        }
        .sidebar-panel.collapsed {
          width: 260px;
          transform: translateX(-100%);
        }
        .sidebar-panel.mobile-open {
          transform: translateX(0);
        }
        .sidebar-panel.mobile-open .sidebar-inner {
          opacity: 1;
        }

        .sidebar-overlay {
          display: block;
          position: fixed;
          inset: 0;
          top: 64px;
          z-index: 49;
          background: rgba(0, 0, 0, 0.4);
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.3s ease;
        }
        .sidebar-overlay.open {
          opacity: 1;
          pointer-events: auto;
        }
      }
    </style>
    <script>(function(){const s=localStorage.getItem('theme');if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark')}else{document.documentElement.classList.remove('dark')}})();</script>
  </head>
  <body class="bg-[var(--bg-secondary)] text-[var(--text-primary)] dark:bg-[var(--bg-primary)] dark:text-[var(--text-primary)]">
    <header class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-[var(--bg-primary)]/80 border-b border-[var(--border)]">
      <nav class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <a href="index.html" class="logo-link flex items-center gap-2 group">
          <div class="w-9 h-9 rounded-md bg-gradient-to-br from-[#d97706] to-[#92400e] text-white grid place-items-center font-serif">⚖️</div>
          <span class="font-serif text-xl font-bold tracking-wide">NyayaAI</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a class="hover:text-[var(--accent)] dark:hover:text-[var(--accent-hover)] transition" href="features.html">Features</a>
          <a class="text-[var(--accent)] font-medium border-b-2 border-[var(--accent)] pb-0.5" href="chat.html">Chat</a>
          <a class="hover:text-[var(--accent)] dark:hover:text-[var(--accent-hover)] transition" href="about.html">About</a>
          <a class="hover:text-[var(--accent)] dark:hover:text-[var(--accent-hover)] transition" href="contact.html">Contact</a>
        </div>
        <div class="flex items-center gap-2">
          <button id="themeToggle" class="inline-flex items-center gap-2 rounded-full border border-[var(--border)] px-3 py-1.5 text-sm hover:shadow-soft transition">
            <span>🌙</span><span class="hidden sm:inline">Theme</span>
          </button>
          <a href="chat.html" class="ml-1 inline-flex items-center rounded-full bg-gradient-to-r from-[#d97706] to-[#b45309] text-white px-4 py-2 text-sm font-medium shadow-soft hover:from-[#b45309] hover:to-[#92400e] border border-[#92400e]/40">Start Chat</a>
        </div>
      </nav>
    </header>
    <div class="h-[calc(100vh-4rem)] flex overflow-hidden">
      <!-- Sidebar -->
      <aside id="sidebarPanel" class="sidebar-panel" role="navigation" aria-label="Chat history">
        <div class="sidebar-inner">

          <div class="h-14 flex items-center justify-between px-4 shrink-0">
            <span class="font-serif font-bold text-base text-[var(--text-primary)]">NyayaAI</span>
            <div class="flex items-center gap-1">
              <button class="p-2 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="Search">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
              </button>
              <button class="p-2 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="New conversation">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button id="sidebarCloseBtn" class="p-2 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition lg:hidden" aria-label="Close sidebar">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="px-2 shrink-0">
            <button id="newChat" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition cursor-pointer">
              <svg class="w-4 h-4 text-[var(--text-muted)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              New chat
            </button>
          </div>

          <div class="px-2 mt-1 space-y-0.5 shrink-0">
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
              Chats
            </div>
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] hover:text-[var(--text-primary)] transition cursor-pointer">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              </svg>
              Projects
            </div>
          </div>

          <div class="flex items-center justify-between px-3 py-2 mt-2 shrink-0">
            <span class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wider">Recents</span>
            <svg class="w-4 h-4 text-[var(--text-muted)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M6 12h12M10 18h4"/>
            </svg>
          </div>

          <ul id="historyList" class="flex-1 overflow-y-auto px-2 space-y-0.5 ny-scroll"></ul>

          <div class="hidden">
            <button id="renameChat">Rename</button>
            <button id="deleteChat">Delete</button>
          </div>

          <div class="flex items-center gap-3 px-3 py-4 border-t border-[var(--border)] shrink-0">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#d97706] to-[#92400e] text-white text-xs flex items-center justify-center font-bold shrink-0">RS</div>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-[var(--text-primary)] truncate">Rishav Singh</div>
              <div class="text-xs text-[var(--text-muted)]">NyayaAI</div>
            </div>
            <div class="flex items-center">
              <button class="p-1.5 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="Export">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
              </button>
              <button class="p-1.5 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="Settings">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M8 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-3"/>
                  <path d="M16 3h5v5"/>
                  <path d="M21 3L12 12"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Mobile overlay backdrop -->
      <div id="sidebarOverlay" class="sidebar-overlay"></div>

      <!-- Chat Area -->
      <main class="chat-main">
        <div class="h-14 flex items-center justify-between px-4 border-b border-[var(--border)] shrink-0">
          <div class="flex items-center gap-2">
            <button id="sidebarToggle" class="p-2 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="Toggle sidebar">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
              </svg>
            </button>
          </div>
          <div class="text-sm font-medium text-[var(--text-primary)]">NyayaAI</div>
          <div class="flex items-center gap-2">
            <button class="p-2 rounded-md text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition" aria-label="Documents">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </button>
            <button id="testConnection" class="text-sm font-medium px-3 py-1.5 rounded-lg border border-[var(--border)] text-[var(--text-secondary)] hover:bg-[var(--bg-tertiary)] transition">Test</button>
          </div>
        </div>

        <div id="chatContainer" class="flex-1 overflow-y-auto px-4 py-6 ny-scroll">
          <div class="flex flex-col items-center justify-center h-full text-center px-4">
            <h2 class="font-serif text-3xl font-bold text-[var(--text-primary)] mb-3">How can I help you?</h2>
            <p class="text-[var(--text-secondary)] text-base max-w-sm">Ask me anything about Indian law — sections, cases, rights, procedures.</p>
          </div>
        </div>

        <div class="px-4 py-4 bg-[var(--bg-primary)] shrink-0">
          <div class="max-w-3xl mx-auto w-full">
            <form id="chatForm" class="w-full">
              <div class="rounded-2xl border border-[var(--border)] bg-[var(--bg-secondary)] dark:bg-[var(--bg-tertiary)] shadow-soft focus-within:border-[var(--accent)]/50 focus-within:shadow-md transition">
                <div class="px-4 pt-3 pb-1">
                  <textarea id="chatInput" rows="1" placeholder="Type your legal question or ask about uploaded document..." class="w-full bg-transparent resize-none focus:outline-none text-[var(--text-primary)] placeholder:text-[var(--text-muted)] text-sm leading-6 min-h-[40px] max-h-40 ny-scroll" required></textarea>
                </div>
                <div class="px-3 pb-3 flex items-center justify-between gap-2">
                  <div class="flex items-center gap-1">
                    <button type="button" id="fileUploadBtn" title="Upload document" class="p-2 rounded-lg text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition">
                      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                      </svg>
                    </button>
                    <button type="button" id="micBtn" title="Voice input (coming soon)" class="p-2 rounded-lg text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition">
                      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                        <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
                      </svg>
                    </button>
                    <button type="button" id="searchToggle" title="Toggle web search" class="p-2 rounded-lg text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-tertiary)] transition">
                      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                      </svg>
                    </button>
                    <span class="text-xs text-[var(--text-muted)] ml-1">Gemini 2.5 Flash</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span id="inputCounter" class="text-xs text-[var(--text-muted)]"></span>
                    <button type="submit" class="w-9 h-9 rounded-full bg-gradient-to-br from-[#d97706] to-[#b45309] text-white flex items-center justify-center hover:from-[#b45309] hover:to-[#92400e] transition disabled:opacity-40 shadow-soft border border-[#92400e]/40">
                      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 19V5M5 12l7-7 7 7"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
              <input type="file" id="fileUpload" accept=".pdf,.txt,.doc,.docx" class="hidden" />
            </form>

            <div id="uploadStatus" class="hidden mt-2 text-sm max-w-3xl mx-auto"></div>
            <div id="uploadedFile" class="hidden mt-2 px-4 py-2.5 rounded-xl bg-[var(--accent-subtle)] border border-[var(--accent)]/20 flex items-center justify-between text-sm max-w-3xl mx-auto">
              <div class="flex items-center gap-2">
                <span class="text-[var(--accent)]">✅</span>
                <span class="font-medium text-[var(--text-primary)]" id="uploadedFileName"></span>
              </div>
              <button id="removeFile" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 text-sm">Remove</button>
            </div>
            <div id="chatError" class="hidden mt-3 text-sm text-red-600 max-w-3xl mx-auto"></div>
            <div id="sourcesBar" class="hidden mt-3 text-xs text-[var(--text-muted)] max-w-3xl mx-auto"></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var sidebar = document.getElementById('sidebarPanel');
        var overlay = document.getElementById('sidebarOverlay');
        var toggleBtn = document.getElementById('sidebarToggle');
        var closeBtn = document.getElementById('sidebarCloseBtn');

        function isMobile() { return window.innerWidth < 768; }

        function openSidebar() {
          if (isMobile()) {
            sidebar.classList.remove('collapsed');
            sidebar.classList.add('mobile-open');
            if (overlay) overlay.classList.add('open');
          } else {
            sidebar.classList.remove('collapsed');
          }
          toggleBtn.setAttribute('aria-expanded', 'true');
          if (closeBtn) closeBtn.setAttribute('aria-expanded', 'true');
        }

        function closeSidebar() {
          if (isMobile()) {
            sidebar.classList.remove('mobile-open');
            sidebar.classList.add('collapsed');
            if (overlay) overlay.classList.remove('open');
          } else {
            sidebar.classList.add('collapsed');
          }
          toggleBtn.setAttribute('aria-expanded', 'false');
          if (closeBtn) closeBtn.setAttribute('aria-expanded', 'false');
        }

        function toggleSidebar() {
          if (isMobile()) {
            if (sidebar.classList.contains('mobile-open')) {
              closeSidebar();
            } else {
              openSidebar();
            }
          } else {
            if (sidebar.classList.contains('collapsed')) {
              openSidebar();
            } else {
              closeSidebar();
            }
          }
        }

        if (toggleBtn) { toggleBtn.addEventListener('click', toggleSidebar); }
        if (closeBtn) { closeBtn.addEventListener('click', closeSidebar); }
        if (overlay) { overlay.addEventListener('click', closeSidebar); }

        toggleBtn.setAttribute('aria-controls', 'sidebarPanel');
        toggleBtn.setAttribute('aria-expanded', 'true');
        if (closeBtn) {
          closeBtn.setAttribute('aria-controls', 'sidebarPanel');
          closeBtn.setAttribute('aria-expanded', 'true');
        }

        var resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function () {
            if (isMobile()) {
              sidebar.classList.remove('collapsed');
              if (!sidebar.classList.contains('mobile-open')) {
                sidebar.classList.add('collapsed');
              }
            } else {
              sidebar.classList.remove('mobile-open');
              if (overlay) overlay.classList.remove('open');
            }
          }, 150);
        });
      });
    </script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
